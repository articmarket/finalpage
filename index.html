<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTIC MARKET Registration - Success</title>
    
    <!-- Original Fonts Preserved -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Premium App Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0f1a0d;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-heading-new { font-family: 'Outfit', sans-serif; } 
        .font-body-new { font-family: 'Plus Jakarta Sans', sans-serif; } 

        .texture {
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.15;
            mix-blend-mode: overlay;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        
        .pulse-ring {
            animation: pulseGlow 2s infinite;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* =========================================
           END PAGE STYLES
           ========================================= */
        .location-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f8faf8;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            padding: 10px 22px;
            margin: 0 auto;
            font-size: 13.5px;
            font-weight: 600;
            color: #334155;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .location-badge .loc-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #22c55e;
            animation: dotPulse 2s infinite;
        }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }

        .referral-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            padding: 26px 20px 24px;
            margin-top: 10px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
            width: 100%;
        }

        /* DYNAMIC MARKER ANIMATION */
        .marker-stroke {
            stroke-dasharray: 115;
            stroke-dashoffset: 115;
            transition: stroke-dashoffset 1.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .active .marker-stroke {
            stroke-dashoffset: 0;
        }

        .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 0 24px;
            height: 52px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #00d757;
            font-family: 'Inter', sans-serif;
            margin: 0 auto;
            z-index: 1;
            box-shadow: 0 8px 22px rgba(0, 215, 87, 0.4);
            animation: wpPulse 2.4s ease-in-out infinite;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: white;
            font-size: 15px;
            width: 100%;
        }
        @keyframes wpPulse {
            0%, 100% { box-shadow: 0 8px 22px rgba(0, 215, 87, 0.4), 0 0 0 0 rgba(0, 215, 87, 0.55); }
            60% { box-shadow: 0 8px 22px rgba(0, 215, 87, 0.4), 0 0 0 16px rgba(0, 215, 87, 0); }
        }
        .whatsapp-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: skewX(-25deg);
            transition: all 0.6s ease;
            z-index: -1;
        }
        .whatsapp-btn:hover {
            transform: translateY(-3px);
            background-color: #00e65c;
            animation-play-state: paused;
            box-shadow: 0 14px 32px rgba(0, 215, 87, 0.55), 0 0 0 8px rgba(0, 215, 87, 0.08) !important;
        }
        .whatsapp-btn:hover::after { left: 120%; }
        .whatsapp-btn:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(0, 215, 87, 0.4) !important;
        }
        .whatsapp-icon {
            width: 22px;
            height: 22px;
            fill: white;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
        }
        .whatsapp-btn:hover .whatsapp-icon { transform: scale(1.15) rotate(-8deg); }
    </style>
</head>
<body class="antialiased">
    
    <!-- Deep Ambient Background Core -->
    <div class="fixed inset-0 z-0 pointer-events-none bg-[#0a1009]">
        <div class="absolute inset-0 bg-cover bg-center transition-all duration-1000 scale-105" 
             style="background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1920&h=1080');">
        </div>
        <div class="absolute inset-0 bg-gradient-to-b from-[#0a1009]/85 via-[#0a1009]/65 to-[#0a1009]/95"></div>
        <div class="absolute inset-0 texture pointer-events-none"></div>
    </div>

    <div class="relative z-10 grid w-full place-items-center min-h-[100dvh]">
        
        <!-- ================= ENDING PAGE (Double Expand & Slide-Up Reveal) ================= -->
        <div id="page-ending" class="w-full h-full min-h-[100dvh] flex flex-col justify-center items-center py-12 px-5 relative" style="grid-area: 1/1;">
            
            <div id="page-ending-card" class="w-full max-w-[520px] bg-white rounded-[32px] md:rounded-[40px] px-6 md:px-10 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8)] flex flex-col items-center relative mx-auto text-center overflow-hidden">
                
                <!-- TOP SECTION (First Accordion Wrapper) -->
                <div id="success-wrapper" class="w-full overflow-hidden" style="height: 0; opacity: 0;">
                    
                    <!-- Inner Slide-Up Content -->
                    <div id="success-inner" class="flex flex-col items-center w-full relative z-10 bg-white pt-12 pb-2 md:pt-[55px] md:pb-4">
                        
                        <div class="relative mb-6">
                            <div class="absolute inset-0 rounded-full border-[2.5px] border-[#22c55e] pulse-ring"></div>
                            <div id="checkmark-circle" class="w-20 h-20 bg-gradient-to-br from-[#22c55e] to-[#16a34a] rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(34,197,94,0.35)] relative z-10">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path id="checkmark-tick" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                                </svg>
                            </div>
                        </div>

                        <h2 class="success-stagger font-heading-new text-[32px] md:text-[36px] font-black text-[#0f1a0d] mb-2 tracking-tight">
                            Thank <span class="text-[#22c55e]">You!</span>
                        </h2>
                        
                        <p class="success-stagger text-slate-700 text-[15px] font-semibold mb-6">Your wholesale access is fully secured.</p>

                        <!-- Location Radar Badge -->
                        <div class="success-stagger location-badge mb-2">
                            <span class="loc-dot"></span>
                            Rajapalayam — Location Soon
                        </div>

                    </div>
                </div>

                <!-- BOTTOM SECTION (Second Accordion Wrapper) -->
                <div id="reward-wrapper" class="w-full overflow-hidden" style="height: 0; opacity: 0;">
                    
                    <!-- Inner Slide-Down Content -->
                    <div id="reward-inner" class="w-full pt-[0.2rem] pb-12 md:pb-16 flex flex-col items-center">
                        
                        <!-- Referral Card -->
                        <div class="referral-card">
                            
                            <!-- Bouncing Gift Box -->
                            <div class="text-5xl animate-bounce mb-3">🎁</div>

                            <h3 class="text-[1.55rem] font-black text-[#0f1a0d] mb-3 font-heading-new inline-block relative">
                                <span id="highlight-trigger" class="relative inline-block px-2">
                                    <span class="relative z-10">Unlock Extra <span class="text-[#22c55e]">10% OFF</span></span>
                                    <svg class="absolute inset-x-0 bottom-[2px] h-[65%] w-[104%] -left-[2%] z-0 pointer-events-none" viewBox="0 0 100 10" preserveAspectRatio="none">
                                        <path d="M 2,5 Q 50,7 98,4" fill="none" stroke="rgba(253, 224, 71, 0.9)" stroke-width="8" stroke-linecap="round" class="marker-stroke" />
                                    </svg>
                                </span>
                            </h3>
                            <p class="text-gray-600 text-[14px] leading-relaxed mb-6 font-medium">
                                Share with <span class="text-[#22c55e] font-bold">10 friends & family</span> in Rajapalayam to unlock an exclusive discount.
                            </p>

                            <!-- WhatsApp Pulse Button -->
                            <button onclick="share()" class="whatsapp-btn">
                                <svg class="whatsapp-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                                    <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232"/>
                                </svg>
                                <span>Share on WhatsApp</span>
                            </button>
                        </div>

                        <a href="https://articmarket.com" class="text-slate-600 hover:text-slate-800 hover:underline text-[12px] font-bold transition-all uppercase tracking-[0.06em] flex items-center justify-center gap-1.5 mt-7">
                            Skip to website
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                            </svg>
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        // Init App Animation Directly on Page Load
        window.addEventListener('DOMContentLoaded', () => {
            
            // Set Initial States for the Double Expand & Reveal Effect
            gsap.set("#page-ending-card", { opacity: 0, y: 30 }); // Overall wrapper moves up slightly
            gsap.set("#success-wrapper", { height: 0, opacity: 0 }); // First accordion starts collapsed
            gsap.set("#success-inner", { y: 40 }); // Text starts pushed down (for Slide-Up Reveal)
            
            gsap.set("#checkmark-circle", { scale: 0 });
            gsap.set("#checkmark-tick", { strokeDasharray: 24, strokeDashoffset: 24 });
            gsap.set(".success-stagger", { opacity: 0, y: 15 });
            
            gsap.set("#reward-wrapper", { height: 0, opacity: 0 }); // Second accordion starts collapsed
            gsap.set("#reward-inner", { y: -50 }); // Elements start pushed up (for Parallax Slide Down)
            
            document.getElementById('highlight-trigger').classList.remove('active');

            const tl = gsap.timeline();

            // Phase 1: Card appears and FIRST accordion expands (Slide-Up Reveal)
            tl.to("#page-ending-card", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out", delay: 0.3 })
              .to("#success-wrapper", { height: "auto", opacity: 1, duration: 1.0, ease: "power4.inOut" }, "<")
              .to("#success-inner", { y: 0, duration: 1.0, ease: "power4.out" }, "<0.1") 
              
              // Pop checkmark & text stagger alongside the reveal
              .to("#checkmark-circle", { scale: 1, duration: 0.5, ease: "back.out(1.6)" }, "-=0.3")
              .to("#checkmark-tick", { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" })
              .add(() => {
                  confetti({ particleCount: 130, spread: 80, origin: { y: 0.45, x: 0.5 }, colors: ['#22c55e', '#facc15', '#16a34a'] });
              }, "-=0.1")
              .to(".success-stagger", { opacity: 1, y: 0, duration: 0.45, stagger: 0.1, ease: "power2.out" }, "-=0.1")
              
              // Build suspense while user reads "Thank You"
              .to({}, { duration: 1.0 }) 
              .addLabel("showReward")
              
              // Phase 2: SECOND accordion expands smoothly down
              .to("#reward-wrapper", { height: "auto", duration: 1.4, ease: "power4.inOut" }, "showReward")
              .to("#reward-inner", { y: 0, duration: 1.4, ease: "power4.inOut" }, "showReward")
              .to("#reward-wrapper", { opacity: 1, duration: 1.0, ease: "power2.out" }, "showReward+=0.4")
              
              // Phase 3: Trigger the premium yellow marker sweep right as the card slides down and settles
              .add(() => {
                  document.getElementById('highlight-trigger').classList.add('active');
              }, "showReward+=1.2");
        });

        // Share Link logic
        function share() {
            const text = "Hey! 🥦 I just got VIP wholesale access to farm-fresh veggies at ARTIC MARKET in Rajapalayam. \n\nRegister using my link and we BOTH get an extra 10% OFF! 🎉🍅 \n\nGet it here: [Insert Link]";
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>s
