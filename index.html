<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARTIC MARKET — Fresh Farmers Market Experience</title>
  
  <!-- Premium Fonts CDN (Clash Display, Satoshi, and Outfit) -->
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&f[]=satoshi@300,400,500,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            headingNew: ['Outfit', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- GSAP for Editorial Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    /* --------------------------------------------------
       1. Custom Properties & Reset
       -------------------------------------------------- */
    :root {
      --color-primary-green: #6DBE45;
      --color-primary-yellow: #F4C542;
      --color-charcoal-black: #0C0C0C;
      --color-text-white: #FFFFFF;
      --color-text-muted: rgba(255, 255, 255, 0.6);
      --font-display: 'Clash Display', -apple-system, sans-serif;
      --font-body: 'Satoshi', -apple-system, sans-serif;
      --accent-green: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #0a1009;
      color: var(--color-text-white);
      font-family: var(--font-body);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* --------------------------------------------------
       2. Custom Utility Classes
       -------------------------------------------------- */
    .texture {
      background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
      opacity: 0.15;
      mix-blend-mode: overlay;
    }

    .font-heading-new {
      font-family: 'Outfit', sans-serif;
    }

    .font-display {
      font-family: var(--font-display);
    }

    /* Precise Line Mask for Split-Line Reveal */
    .line-mask {
      display: block;
      overflow: hidden;
    }

    /* Cohesive block elements for full line translation */
    .line-element {
      display: block;
      will-change: transform;
    }

    /* --------------------------------------------------
       3. Main Container
       -------------------------------------------------- */
    .viewport-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      z-index: 10;
    }

    /* --------------------------------------------------
       4. Core Center Content (Hero)
       -------------------------------------------------- */
    .hero-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 900px;
      z-index: 20;
    }

    /* Outer Label Layout & Typography - Restored Exactly to Original */
    .location-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      font-size: 1.19rem;
      font-weight: 700;
      font-family: 'Satoshi', sans-serif;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
      opacity: 0; 
    }

    /* Blinking Radar Core Dot - Restored Exactly to Original */
    .pulse-dot {
      position: relative;
      width: 10px;
      height: 10px;
      background-color: var(--accent-green);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--accent-green);
      flex-shrink: 0;
    }

    /* Expanding Radar Ring - Restored Exactly to Original */
    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background-color: rgba(34, 197, 94, 0.7);
      animation: pulse 2s infinite;
    }

    /* Pulse Animation */
    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      100% {
        transform: scale(5);
        opacity: 0;
      }
    }

    .title-wrapper {
      overflow: hidden;
      margin-bottom: 12px;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 9.5vw, 8.5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .hero-title .artic {
      color: var(--color-primary-green);
    }

    .hero-title .market {
      color: var(--color-primary-yellow);
    }

    /* Subtext Styling */
    .hero-subtext {
      font-family: 'Outfit', 'Satoshi', sans-serif;
      font-weight: 500;             
      color: #f5f5f5;               
      line-height: 1.625;           
      text-align: center;
      max-width: 750px;
      margin-left: auto;
      margin-right: auto;
      margin-top: 0.3rem;      
      margin-bottom: 4.0rem;   
      padding-left: 1rem;
      padding-right: 1rem;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.9)); 
      opacity: 0;                   
    }

    /* Responsive Font Sizes */
    @media (min-width: 0px) {
      .hero-subtext { font-size: 18px; }
    }
    @media (min-width: 640px) {
      .hero-subtext { font-size: 22px; }
    }
    @media (min-width: 1024px) {
      .hero-subtext { font-size: 24px; }
    }

    /* --------------------------------------------------
       5. Base Button Layout (Award-Winning Style)
       -------------------------------------------------- */
    .cta-btn {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      gap: 1.25rem;
      background-color: #ffffff;
      color: #0c0c0c;
      padding: 0.65rem 0.65rem 0.65rem 2.25rem;
      border-radius: 9999px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      will-change: transform, opacity;
      margin-top: 6px;
      margin-bottom: -6px;
      /* The psychological attractive pulse */
      animation: buttonPulse 3s infinite cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes buttonPulse {
      0% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 0 0 rgba(255, 255, 255, 0.4); }
      70% { box-shadow: 0 15px 35px rgba(255, 255, 255, 0.15), 0 0 0 14px rgba(255, 255, 255, 0); }
      100% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 0 0 rgba(255, 255, 255, 0); }
    }

    .cta-btn:hover {
      transform: scale(1.04);
      /* Enhances glow & stops pulse visually on hover for control */
      box-shadow: 0 15px 35px rgba(255, 255, 255, 0.25), 0 0 0 6px rgba(255, 255, 255, 0.1) !important;
      animation-play-state: paused;
    }

    .cta-btn:active {
      transform: scale(0.98);
    }

    /* Shiny Sweep Across the Button */
    .cta-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 150%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(0, 0, 0, 0.08) 50%,
        transparent 100%
      );
      transform: skewX(-20deg);
      transition: left 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
    }
    
    .cta-btn:hover::before {
      left: 150%;
    }

    .btn-text {
      position: relative;
      z-index: 1;
    }

    /* Award-Winning Arrow Icon Animation Container */
    .arrow-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: #0c0c0c;
      color: #ffffff;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    /* Default back-and-forth attention animation */
    .arrow-1 {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: arrowBounce 1.2s infinite ease-in-out;
    }

    @keyframes arrowBounce {
      0%, 100% {
        transform: translateX(-3px);
      }
      50% {
        transform: translateX(3px);
      }
    }

    /* --------------------------------------------------
       6. Social Proof Section
       -------------------------------------------------- */
    .social-proof {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 0; 
      margin-bottom: 32px;
      opacity: 0; 
    }

    .avatar-group {
      display: flex;
      align-items: center;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2px solid var(--color-charcoal-black); 
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
    }

    .avatar:first-child {
      margin-left: 0;
    }

    .avatar-1 {
      background-color: #1A2E16; 
      z-index: 3;
      color: var(--color-primary-green);
    }

    .avatar-2 {
      background-color: #332B10;
      z-index: 2;
      color: var(--color-primary-yellow);
    }

    .avatar-3 {
      background-color: var(--color-text-white);
      z-index: 1;
      color: var(--color-charcoal-black);
      font-weight: 700;
      font-size: 14px;
      padding-top: 2px;
    }

    .social-text {
      font-family: var(--font-body);
      font-size: 1.0rem;
      color:rgb(255 255 255);
      letter-spacing: 0.05em;
    }

    /* --------------------------------------------------
       7. Premium Glowing Highlighter Pill, Float & Shimmer
       -------------------------------------------------- */
    .highlighter-pill {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: floatPill 5s ease-in-out infinite; 
      width: 105px; 
      flex-shrink: 0; 
      font-variant-numeric: tabular-nums; 
    }

    @keyframes floatPill {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-4px); 
      }
    }

    .highlighter-pill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.45) 50%,
        transparent 100%
      );
      transform: skewX(-20deg);
      animation: shimmerSweep 4s infinite ease-in-out;
    }

    @keyframes shimmerSweep {
      0% { left: -150%; }
      30% { left: 150%; }
      100% { left: 150%; }
    }

    /* --------------------------------------------------
       8. Mobile Layout & Position Adaptations
       -------------------------------------------------- */
    @media (max-width: 767px) {
      .viewport-container {
        padding: 20px 20px 28px 20px !important;
        height: 100dvh !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        align-items: center !important;
      }

      .location-label {
        position: absolute !important;
        top: 24px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        margin-bottom: 0 !important;
        z-index: 30;
        gap: 0.75rem !important;
        font-size: 0.8rem !important;
        font-weight: 800 !important;
        letter-spacing: 0.25em !important;
        padding: 0.55rem 1.35rem !important;
        background-color: rgba(12, 12, 12, 0.65) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 9999px !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.3)) !important;
      }

      .pulse-dot {
        width: 8px !important;
        height: 8px !important;
        box-shadow: 0 0 10px var(--accent-green) !important;
      }

      .hero-container {
        width: 100% !important;
        height: 100% !important;
        max-width: 100% !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: space-between !important;
        align-items: center !important;
        padding-top: 50px !important; 
      }

      .hero-title {
        display: flex;
        flex-direction: column;
        line-height: 1.0;
        font-size: 4.7rem !important;
        margin-bottom: 12px !important;
      }

      .hero-subtext {
        margin-top: -0.3rem !important;
        margin-bottom: 2.25rem !important;
        font-size: 18px !important;
        line-height: 1.5 !important;
        color: rgba(255, 255, 255, 0.8) !important;
        padding-left: 0.5rem !important;
        padding-right: 0.5rem !important;
      }

      .social-proof {
        display: grid !important;
        grid-template-columns: auto auto !important;
        justify-content: center !important;
        align-items: center !important;
        column-gap: 8px !important;
        row-gap: 12px !important;
        margin-top: 0 !important;
        margin-bottom: 24px !important;
      }

      .avatar-group {
        grid-column: 1 !important;
        grid-row: 1 !important;
      }

      .social-text {
        display: contents !important; 
      }

      .highlighter-pill {
        grid-column: 2 !important;
        grid-row: 1 !important;
        margin: 0 !important;
        width: 95px !important;
        height: 34px !important;
        font-size: 1.15rem !important;
      }

      .registered-label {
        grid-column: 1 / span 2 !important;
        grid-row: 2 !important;
        text-align: center !important;
        text-transform: uppercase !important;
        font-size: 0.75rem !important;
        letter-spacing: 0.15em !important;
        font-weight: 700 !important;
        color: rgba(255, 255, 255, 0.8) !important;
      }

      /* Mobile Call-To-Action Button stretching */
      .cta-btn {
        width: 100% !important;
        display: flex !important;
        justify-content: center !important;
        padding: 0.75rem 0.75rem 0.75rem 1.75rem !important;
        margin-top: auto !important;
        margin-bottom: 0 !important;
      }
    }

    /* --------------------------------------------------
       9. Extra Small Screens Override (Below 370px)
       -------------------------------------------------- */
    @media (max-width: 370px) {
      /* Reposition/scale top logo to prevent collision */
      .logo-anim {
        top: 16px !important;
        left: 16px !important;
      }
      .logo-anim > div {
        width: 36px !important;
        height: 36px !important;
      }
      .logo-anim span {
        font-size: 18px !important;
      }

      /* Scale down Location Badge */
      .location-label {
        top: 18px !important;
        font-size: 0.65rem !important;
        padding: 0.4rem 0.8rem !important;
        gap: 0.4rem !important;
      }
      .pulse-dot {
        width: 6px !important;
        height: 6px !important;
      }

      /* Reduce Hero Title specifically so it fits without horizontal scrolling */
      .hero-title {
        font-size: 3.7rem !important;
      }

      /* Adjust Subtext */
      .hero-subtext {
        font-size: 14px !important;
        margin-bottom: 1.5rem !important;
      }

      /* Condense Social Proof layout */
      .social-proof {
        column-gap: 6px !important;
      }
      .avatar {
        width: 32px !important;
        height: 32px !important;
      }
      .highlighter-pill {
        width: 80px !important;
        height: 30px !important;
        font-size: 1rem !important;
      }
      .registered-label {
        font-size: 0.65rem !important;
      }

      /* Squeeze CTA Button to safely fit edges */
      .cta-btn {
        padding: 0.5rem 0.5rem 0.5rem 1.25rem !important;
        font-size: 0.8rem !important;
        gap: 0.75rem !important;
      }
      .arrow-wrapper {
        width: 36px !important;
        height: 36px !important;
      }
      .arrow-1 svg {
        width: 14px !important;
        height: 14px !important;
      }
    }
  </style>
</head>
<body class="antialiased">

  <!-- Deep Ambient Background Core -->
  <div class="fixed inset-0 z-0 pointer-events-none bg-[#0a1009] overflow-hidden">
    <div id="bg-image" class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1920&h=1080');"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-[#0a1009]/85 via-[#0a1009]/65 to-[#0a1009]/95"></div>
    <div class="absolute inset-0 texture pointer-events-none"></div>
  </div>

  <!-- Top-Left Corner Logo -->
  <div class="absolute top-6 left-6 md:top-10 md:left-12 z-20 logo-anim">
    <div class="w-12 h-12 md:w-14 md:h-14 bg-white rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(255,255,255,0.15)]">
      <span class="text-[#22c55e] font-heading-new font-[900] text-[22px] md:text-[26px] leading-none pt-[2px]">A</span>
    </div>
  </div>

  <!-- Primary Foreground Content -->
  <div class="viewport-container">

    <!-- Centered Editorial Registration Experience -->
    <main class="hero-container">
      
      <!-- Location Element with Blinking Radar Dot -->
      <div class="location-label flex items-center justify-center gap-[1.5rem] text-[1.19rem] font-bold tracking-[0.35em] uppercase mb-4 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
        <div class="pulse-dot">
          <div class="pulse-ring"></div>
        </div>
        Rajapalayam
      </div>

      <!-- Center Group Wrapper -->
      <div class="flex flex-col items-center justify-center flex-grow md:flex-grow-0 my-auto w-full">
        <div class="title-wrapper">
          <h1 class="hero-title flex flex-col items-center">
            <span class="line-mask block">
              <span class="line-element block artic">Artic</span>
            </span>
            <span class="line-mask block">
              <span class="line-element block market">Market</span>
            </span>
          </h1>
        </div>
        
        <!-- Subtext Block with added Emojis -->
        <p class="hero-subtext font-headingNew text-[18px] sm:text-[22px] lg:text-[24px] mt-[0.3rem] mb-[4.0rem] leading-relaxed px-4 max-w-[750px] mx-auto text-center">
          Register now to get fresh vegetables at wholesale price. 🥕 🛒
        </p>
        
        <!-- Solid Social Proof / Counter Widget -->
        <div class="social-proof">
          <div class="avatar-group">
            <div class="avatar avatar-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
              </svg>
            </div>
            <div class="avatar avatar-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
              </svg>
            </div>
            <div class="avatar avatar-3">
              <span>+</span>
            </div>
          </div>
          
          <p class="social-text flex items-center justify-center">
            <span class="highlighter-pill inline-flex items-center justify-center py-0.5 mx-1.5 rounded-full bg-[#F4C542] text-[#0C0C0C] font-display font-extrabold text-[1.4rem] tracking-normal shadow-[0_0_20px_rgba(244,197,66,0.35)]">
              <span id="registered-count">0</span>
            </span>
            <span class="registered-label inline-block">People've Registered</span>
          </p>
        </div>
      </div>

      <!-- Award Winning CTA Button -->
      <button class="cta-btn">
        <span class="btn-text">Register Now</span>
        <span class="arrow-wrapper">
          <span class="arrow-1">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"></path>
              <path d="m12 5 7 7-7 7"></path>
            </svg>
          </span>
        </span>
      </button>

    </main>

  </div>

  <!-- Smooth Motion Controls -->
  <script>
    window.addEventListener('DOMContentLoaded', () => {

      const tl = gsap.timeline();

      // Background Image Initial Zoom & Darkness
      gsap.set('#bg-image', { 
        scale: 1.35, 
        filter: 'brightness(0.15) contrast(1.4)' 
      });

      // Split-Line Elements Initial State
      gsap.set('.line-element', { 
        y: "105%" 
      });

      // Logo Reveal starting states
      gsap.set('.logo-anim', {
        opacity: 0,
        y: -150,
        scale: 0.75,
        rotate: -12
      });
      gsap.set('.logo-anim span', {
        opacity: 0,
        scale: 0.4
      });

      // Subtext Initial State
      gsap.set('.hero-subtext', { 
        opacity: 0,
        y: 30 
      });

      // Social Proof Component
      gsap.set('.social-proof', { 
        opacity: 1 
      });
      gsap.set('.avatar', { 
        opacity: 0, 
        scale: 0, 
        x: -25, 
        rotate: -45 
      });
      gsap.set('.highlighter-pill', { 
        opacity: 0, 
        scale: 0.2, 
        y: 30, 
        rotateX: 75,
        transformPerspective: 1000 
      });
      gsap.set('.registered-label', { 
        opacity: 0, 
        x: 15 
      });

      // CTA Button Initial State
      gsap.set('.cta-btn', { 
        opacity: 0, 
        scale: 0.85, 
        y: 35 
      });

      // 1. Top-Left Logo Swoop-Down Reveal
      tl.to('.logo-anim', {
        opacity: 1,
        y: 0,
        scale: 1,
        rotate: 0,
        duration: 2.0,
        ease: 'expo.out'
      }, '+=0.1');

      tl.to('.logo-anim span', {
        opacity: 1,
        scale: 1,
        duration: 1.4,
        ease: 'power4.out'
      }, '-=1.7');

      // 2. Location Label Reveal
      tl.fromTo('.location-label', {
        opacity: 0,
        y: 20
      }, {
        opacity: 1,
        y: 0,
        duration: 1.4,
        ease: 'power4.out'
      }, '-=1.2');

      // 3. Split-Line Reveal Animation
      tl.to('.line-element', {
        y: "0%",
        duration: 1.9,       
        stagger: 0.22,       
        ease: 'expo.out'     
      }, '-=1.2');

      // 4. Subtext Fade & Rise
      tl.to('.hero-subtext', {
        opacity: 1,
        y: 0,
        duration: 1.5,       
        ease: 'power3.out'
      }, '-=1.4');

      tl.addLabel('socialReveal', '-=1.2');

      // 5. Social Proof Entrance Reveal
      tl.to('.avatar', {
        opacity: 1,
        scale: 1,
        x: 0,
        rotate: 0,
        duration: 1.1,
        stagger: 0.12,
        ease: 'back.out(1.8)'
      }, 'socialReveal');

      tl.to('.highlighter-pill', {
        opacity: 1,
        scale: 1,
        y: 0,
        rotateX: 0,
        duration: 1.3,
        ease: 'back.out(2.0)'
      }, 'socialReveal+=0.4');

      tl.to('.registered-label', {
        opacity: 1,
        x: 0,
        duration: 1.3,
        ease: 'power4.out'
      }, 'socialReveal+=0.4');

      // 6. Smooth Cinematic Number Counter
      const countObj = { val: 0 };
      tl.to(countObj, {
        val: 2564, 
        duration: 2.2, 
        ease: "power3.out",
        onUpdate: function() {
          document.getElementById('registered-count').innerText = Math.round(countObj.val).toLocaleString();
        }
      }, 'socialReveal+=0.4');

      // 7. Call-To-Action Spring-Up
      tl.to('.cta-btn', {
        opacity: 1,
        scale: 1,
        y: 0,
        duration: 1.8,
        ease: 'back.out(1.4)' 
      }, '-=1.3');

      // 8. Background Scale and Light Reveal
      tl.to('#bg-image', {
        scale: 1.05,
        filter: 'brightness(1) contrast(1)',
        duration: 3.2,
        ease: 'power4.out'
      }, 0);

    });
  </script>
</body>
</html>
