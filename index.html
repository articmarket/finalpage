<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTIC MARKET Registration</title>
    
    <!-- Original Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <!-- Premium Sleek App Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- DM Sans strictly for input form styling -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for Smooth Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Canvas Confetti for Success Page -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #0a1009;
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Safe Typography Classes */
        .font-display { font-family: 'Anton', sans-serif; }
        .font-heading-new { font-family: 'Outfit', sans-serif; } 
        .font-body-new { font-family: 'Plus Jakarta Sans', sans-serif; } 

        /* Page Transition Setup */
        .page-transition {
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .hidden-page {
            opacity: 0;
            transform: translateY(20px) scale(0.98);
            pointer-events: none;
            visibility: hidden;
            z-index: 0;
        }

        .visible-page {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            visibility: visible;
            z-index: 10;
        }

        .texture {
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1;
        }

        /* =========================================
           RESPONSIVE FORM FIELD UI STYLES
           ========================================= */
        :root {
            --green: #16a34a;
            --green-light: #22c55e;
            --yellow: #facc15;
            --white: #ffffff;
            --ink: #0f1a0d;
        }

        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 50px transparent inset !important;
            transition: background-color 5000s ease-in-out 0s !important;
            font-family: 'DM Sans', sans-serif;
        }

        .field { position: relative; width: 100%; opacity: 0; }
        
        .field-inner {
            position: relative; height: 56px; background: #f8faf8; border-radius: 14px; border: 1.5px solid #e5e9e5;
            display: flex; align-items: center; overflow: hidden; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; cursor: text;
        }
        @media(min-width: 640px) { .field-inner { height: 68px; border-radius: 16px; } }
        .field-inner:focus-within { border-color: var(--green-light); background: #fff; box-shadow: 0 0 0 4px rgba(34,197,94,0.1); }

        .field-icon { width: 48px; height: 100%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        @media(min-width: 640px) { .field-icon { width: 52px; } }
        .field-icon svg { color: #9ca3af; transition: color 0.2s; }
        .field-inner:focus-within .field-icon svg { color: var(--green); }

        .field-phone-prefix {
            display: flex; align-items: center; gap: 6px; padding: 0 12px 0 14px; height: 100%;
            border-right: 1.5px solid #e5e9e5; flex-shrink: 0; transition: border-color 0.2s;
        }
        @media(min-width: 640px) { .field-phone-prefix { padding: 0 14px 0 18px; } }
        .field-inner:focus-within .field-phone-prefix { border-color: #c8e6c9; }
        
        .field-phone-prefix img { width: 18px; height: auto; border-radius: 2px; }
        @media(min-width: 640px) { .field-phone-prefix img { width: 20px; } }
        
        .field-phone-prefix span { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; font-family: 'DM Sans', sans-serif;}
        @media(min-width: 640px) { .field-phone-prefix span { font-size: 15px; } }

        .field-content { flex: 1; position: relative; height: 100%; display: flex; align-items: flex-end; overflow: hidden; }

        label.float-label {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 500;
            color: #9ca3af; pointer-events: none; transition: top 0.2s, font-size 0.2s, color 0.2s, transform 0.2s;
            transform-origin: left center; z-index: 2; letter-spacing: 0.01em; font-family: 'DM Sans', sans-serif;
        }
        @media(min-width: 640px) { label.float-label { left: 16px; font-size: 14px; } }
        
        .field-content.filled label.float-label,
        .field-inner:focus-within .field-content label.float-label {
            top: 13px; font-size: 10px; color: var(--green); transform: translateY(0); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
        }
        @media(min-width: 640px) {
            .field-content.filled label.float-label,
            .field-inner:focus-within .field-content label.float-label { top: 14px; font-size: 10.5px; }
        }
        .field-content label.float-label.phone { left: 12px; }
        @media(min-width: 640px) { .field-content label.float-label.phone { left: 14px; } }

        input.field-input {
            position: absolute; bottom: 0; left: 0; right: 0; height: 38px; background: transparent; border: none; outline: none;
            padding: 0 14px 6px 14px; font-size: 14.5px; font-weight: 600; color: var(--ink); font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.01em; z-index: 1; width: 100%;
        }
        @media(min-width: 640px) { input.field-input { height: 42px; padding: 0 16px 8px 16px; font-size: 15.5px; } }
        
        input.field-input.phone { padding: 0 12px 6px 12px; }
        @media(min-width: 640px) { input.field-input.phone { padding: 0 14px 8px 14px; } }

        .field-check {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px;
            border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
        }
        @media(min-width: 640px) { .field-check { right: 16px; width: 20px; height: 20px; } }
        
        .field-check.visible { opacity: 1; }
        .field-check svg { color: white; width: 10px; height: 10px; }
        @media(min-width: 640px) { .field-check svg { width: 11px; height: 11px; } }

        .submit-btn {
            width: 100%; height: 56px; background: var(--ink); color: var(--white); border: none; border-radius: 14px;
            font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.03em; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.25s ease; opacity: 0;
        }
        @media(min-width: 640px) { .submit-btn { height: 64px; border-radius: 16px; gap: 10px; font-size: 17px; } }
        @media(min-width: 768px) { .submit-btn { height: 68px; font-size: 18px; } }
        
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(15,26,13,0.4); }
        .submit-btn:active { transform: scale(0.98); }
        
        .submit-btn .btn-badge {
            width: 22px; height: 22px; border-radius: 6px; background: var(--yellow);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        @media(min-width: 640px) { .submit-btn .btn-badge { width: 24px; height: 24px; border-radius: 8px; } }
        
        .submit-btn .btn-badge svg { color: var(--ink); width: 12px; height: 12px; }
        @media(min-width: 640px) { .submit-btn .btn-badge svg { width: 13px; height: 13px; } }

        .trust-row { display: flex; align-items: center; justify-content: center; opacity: 0; }
        .trust-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #9ca3af; font-weight: 600; font-family: 'DM Sans', sans-serif; }
        .trust-item svg { color: var(--green-light); flex-shrink: 0; }


        /* =========================================
           SUCCESS PAGE STYLES (Merged)
           ========================================= */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .pulse-ring { animation: pulseGlow 2s infinite; }

        .location-badge {
            display: inline-flex; align-items: center; gap: 8px; background: #f8faf8; border: 1px solid #e2e8f0;
            border-radius: 40px; padding: 8px 16px; margin: 0 auto; font-size: 12.5px; font-weight: 600; color: #334155;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.03); font-family: 'Plus Jakarta Sans', sans-serif;
        }
        @media(min-width: 640px) { .location-badge { gap: 10px; padding: 10px 22px; font-size: 13.5px; } }

        .location-badge .loc-dot { width: 9px; height: 9px; border-radius: 50%; background: #22c55e; animation: dotPulse 2s infinite; }
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        }

        .referral-card {
            background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 20px; 
            padding: 24px 14px 24px; /* Increased vertical padding for mobile */
            margin-top: 18px; /* Increased margin for mobile */
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.04); text-align: center; width: 100%;
        }
        /* Lock back down to compact sizes strictly for laptop (640px+) */
        @media(min-width: 640px) { 
            .referral-card { border-radius: 24px; padding: 22px 20px 22px; margin-top: 10px; } 
        }

        .marker-stroke { stroke-dasharray: 115; stroke-dashoffset: 115; transition: stroke-dashoffset 1.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .active .marker-stroke { stroke-dashoffset: 0; }

        @keyframes floatGift {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
        .floating-gift { display: flex; justify-content: center; align-items: center; margin: 0 auto 10px auto; animation: floatGift 3s ease-in-out infinite; filter: drop-shadow(0 8px 12px rgba(250, 204, 21, 0.35)); }

        .whatsapp-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px; padding: 0 16px; height: 48px; border: none;
            border-radius: 40px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #00d757; font-family: 'Inter', sans-serif; margin: 0 auto; z-index: 1; box-shadow: 0 8px 22px rgba(0, 215, 87, 0.4);
            animation: wpPulse 2.4s ease-in-out infinite; font-weight: 700; letter-spacing: 0.02em; color: white; font-size: 14px; width: 100%;
        }
        @media(min-width: 640px) { .whatsapp-btn { gap: 10px; padding: 0 24px; height: 50px; font-size: 15px; } }

        @keyframes wpPulse {
            0%, 100% { box-shadow: 0 8px 22px rgba(0, 215, 87, 0.4), 0 0 0 0 rgba(0, 215, 87, 0.55); }
            60% { box-shadow: 0 8px 22px rgba(0, 215, 87, 0.4), 0 0 0 16px rgba(0, 215, 87, 0); }
        }
        .whatsapp-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent); transform: skewX(-25deg); transition: all 0.6s ease; z-index: -1;
        }
        .whatsapp-btn:hover { transform: translateY(-3px); background-color: #00e65c; animation-play-state: paused; box-shadow: 0 14px 32px rgba(0, 215, 87, 0.55), 0 0 0 8px rgba(0, 215, 87, 0.08) !important; }
        .whatsapp-btn:hover::after { left: 120%; }
        .whatsapp-btn:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(0, 215, 87, 0.4) !important; }
        .whatsapp-icon { width: 18px; height: 18px; fill: white; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); flex-shrink: 0; }
        @media(min-width: 640px) { .whatsapp-icon { width: 22px; height: 22px; } }
    </style>
</head>
<body class="antialiased">
    
    <!-- Exact Fit 100dvh Background -->
    <div class="fixed top-0 left-0 w-full h-[100dvh] sm:h-full z-0 pointer-events-none bg-[#0a1009] overflow-hidden">
        <div class="absolute inset-0 w-full h-full bg-cover bg-center transition-all duration-1000 scale-100 sm:scale-105" 
             style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.65)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&q=80&w=1920&h=1080'); filter: brightness(0.9);">
        </div>
        <div class="absolute inset-0 w-full h-full texture pointer-events-none"></div>
    </div>

    <!-- Main Dynamic Layout Grid -->
    <div class="relative z-10 grid w-full place-items-center min-h-[100dvh]">
        
        <!-- ================= PAGE 1: REGISTRATION FORM ================= -->
        <div id="page-form" class="font-body-new page-transition visible-page w-full h-full min-h-[100dvh] flex flex-col justify-center items-center px-3.5 pt-8 pb-[72px] sm:py-10 sm:px-5 relative" style="grid-area: 1/1;">
            
            <div class="absolute top-[52px] left-[32px] sm:fixed sm:top-8 sm:left-8 z-[100] gsap-back-btn">
                <button class="group flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 bg-transparent sm:bg-white rounded-full sm:shadow-[0_12px_24px_rgba(0,0,0,0.2)] transition-all sm:hover:bg-gray-100 active:scale-90 outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 sm:h-5 sm:w-5 md:h-6 md:w-6 text-[#9ca3af] sm:text-gray-800 transition-transform duration-300 group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
            </div>

            <div class="w-full flex-1 sm:flex-none h-auto min-h-[400px] sm:min-h-0 max-w-[520px] max-h-full bg-white rounded-[26px] sm:rounded-[32px] md:rounded-[40px] px-6 py-7 sm:px-7 sm:pt-14 sm:pb-[48px] md:px-12 md:pt-[75px] md:pb-[53px] shadow-[0_20px_40px_-10px_rgba(0,0,0,0.3)] sm:shadow-[0_30px_60px_-15px_rgba(0,0,0,0.7)] flex flex-col justify-center relative mt-0 sm:mt-0 gsap-card mx-auto">
                
                <div class="mb-8 sm:mb-[36px] w-full text-center mt-3 sm:mt-0">
                    <h2 class="font-heading-new text-[34px] sm:text-4xl md:text-[46px] font-black tracking-[-0.01em] leading-none flex justify-center items-center gap-2 sm:block">
                        <span class="text-[#22c55e] uppercase">ARTIC</span> <span class="text-[#facc15] uppercase">MARKET</span>
                    </h2>
                    <p class="text-gray-500 text-[13.5px] sm:text-[14.5px] md:text-[16px] font-semibold mt-3 sm:mt-4 max-w-[320px] mx-auto leading-relaxed px-2 sm:px-0">Secure your lifetime wholesale access code.</p>
                </div>
                
                <form id="regForm" class="w-full space-y-[26px] sm:space-y-[18px]">
                    
                    <div class="field">
                        <div class="field-inner">
                            <div class="field-icon">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <div class="field-content" id="fc-name">
                                <label class="float-label" for="fname">FULL NAME</label>
                                <input class="field-input" type="text" id="fname" required autocomplete="name" oninput="handleInput(this,'fc-name')">
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-inner">
                            <div class="field-phone-prefix">
                                <img src="https://flagcdn.com/in.svg" alt="India" loading="lazy">
                                <span>+91</span>
                            </div>
                            <div class="field-content" id="fc-phone">
                                <label class="float-label phone" for="fphone">MOBILE NUMBER</label>
                                <input class="field-input phone" type="tel" id="fphone" required pattern="[0-9]{10}" maxlength="10" inputmode="numeric" oninput="handleInput(this,'fc-phone','chk-phone');this.value=this.value.replace(/\D/g,'')">
                            </div>
                            <div class="field-check" id="chk-phone">
                                <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-inner">
                            <div class="field-icon">
                                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            </div>
                            <div class="field-content" id="fc-place">
                                <label class="float-label" for="fplace">CITY / TOWN</label>
                                <input class="field-input" type="text" id="fplace" required autocomplete="address-level2" oninput="handleInput(this,'fc-place')">
                            </div>
                        </div>
                    </div>

                    <div class="pt-[26px] sm:pt-8 w-full">
                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span>Complete Registration</span>
                            <div class="btn-badge">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
                            </div>
                        </button>
                        
                        <div class="trust-row mt-[28px] sm:mt-[20px]">
                            <div class="trust-item">
                                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                                Secure & Encrypted
                            </div>
                        </div>
                    </div>

                </form>
            </div>
        </div>

        <!-- ================= PAGE 2: SUCCESS / END PAGE ================= -->
        <div id="page-ending" class="font-body-new page-transition hidden-page w-full h-full min-h-[100dvh] flex flex-col justify-center items-center py-6 sm:py-8 px-3.5 sm:px-5 relative" style="grid-area: 1/1;">
            
            <div id="page-ending-card" class="w-full max-w-[520px] bg-white rounded-[32px] md:rounded-[40px] px-5 sm:px-6 md:px-10 shadow-[0_30px_60px_-15px_rgba(0,0,0,0.8)] flex flex-col items-center relative mx-auto text-center overflow-hidden">
                
                <!-- TOP SECTION -->
                <div id="success-wrapper" class="w-full overflow-hidden" style="height: 0; opacity: 0;">
                    
                    <!-- Increased mobile padding `pt-12` for a taller stretch, strictly kept `sm:pt-10` for laptop -->
                    <div id="success-inner" class="flex flex-col items-center w-full relative z-10 bg-white pt-12 sm:pt-10 pb-4 sm:pb-2 md:pb-3">
                        
                        <!-- Increased mobile margin `mb-6`, strictly kept `sm:mb-5` for laptop -->
                        <div class="relative mb-6 sm:mb-5">
                            <div class="absolute inset-0 rounded-full border-[2.5px] border-[#22c55e] pulse-ring"></div>
                            <div id="checkmark-circle" class="w-16 h-16 sm:w-20 sm:h-20 bg-gradient-to-br from-[#22c55e] to-[#16a34a] rounded-full flex items-center justify-center shadow-[0_10px_25px_rgba(34,197,94,0.35)] relative z-10">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 sm:h-10 sm:w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path id="checkmark-tick" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                                </svg>
                            </div>
                        </div>

                        <!-- Increased mobile margin `mb-2`, strictly kept `sm:mb-1.5` for laptop -->
                        <h2 class="success-stagger font-heading-new text-[28px] sm:text-[32px] md:text-[36px] font-black text-[#0f1a0d] mb-2 sm:mb-1.5 tracking-tight">
                            Thank <span class="text-[#22c55e]">You!</span>
                        </h2>
                        
                        <!-- Increased mobile margin `mb-6`, strictly kept `sm:mb-5` for laptop -->
                        <p class="success-stagger text-slate-700 text-[13.5px] sm:text-[15px] font-semibold mb-6 sm:mb-5">Your wholesale access is fully secured.</p>

                        <div class="success-stagger location-badge mb-2">
                            <span class="loc-dot"></span>
                            Rajapalayam — Location Soon
                        </div>

                    </div>
                </div>

                <!-- BOTTOM SECTION -->
                <div id="reward-wrapper" class="w-full overflow-hidden" style="height: 0; opacity: 0;">
                    
                    <!-- Increased mobile padding `pb-12` for a taller stretch, strictly kept `sm:pb-10` for laptop -->
                    <div id="reward-inner" class="w-full pt-[0.2rem] pb-12 sm:pb-10 flex flex-col items-center">
                        
                        <div class="referral-card">
                            <div class="floating-gift">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48" class="sm:w-[56px] sm:h-[56px]">
                                    <rect x="12" y="28" width="40" height="30" rx="3" fill="#22c55e" />
                                    <rect x="28" y="28" width="8" height="30" fill="#facc15" />
                                    <rect x="8" y="20" width="48" height="12" rx="2" fill="#16a34a" />
                                    <rect x="28" y="20" width="8" height="12" fill="#eab308" />
                                    <path d="M32 20C32 20 26 6 16 12C10 16 16 20 16 20H32Z" fill="#facc15" />
                                    <path d="M32 20C32 20 38 6 48 12C54 16 48 20 48 20H32Z" fill="#facc15" />
                                    <circle cx="32" cy="20" r="4" fill="#ca8a04" />
                                </svg>
                            </div>

                            <h3 class="text-[22px] sm:text-[1.55rem] font-black text-[#0f1a0d] mb-2 sm:mb-2.5 font-heading-new inline-block relative">
                                <span id="highlight-trigger" class="relative inline-block px-2">
                                    <span class="relative z-10">Unlock Extra <span class="text-[#22c55e]">10% OFF</span></span>

    <script>
        // Form Input Interactions
        function handleInput(input, fcId, chkId) {
            const fc = document.getElementById(fcId);
            const chk = chkId ? document.getElementById(chkId) : null;
            
            if (input.value.trim().length > 0) {
                fc.classList.add('filled');
                if (chk) {
                    const valid = input.type === 'tel' ? /^[0-9]{10}$/.test(input.value) : input.value.trim().length >= 2;
                    chk.classList.toggle('visible', valid);
                }
            } else {
                fc.classList.remove('filled');
                if (chk) chk.classList.remove('visible');
            }
        }

        // WhatsApp Share Logic
        function share() {
            const text = "Hey! 🥦 I just got VIP wholesale access to farm-fresh veggies at ARTIC MARKET in Rajapalayam. \n\nRegister using my link and we BOTH get an extra 10% OFF! 🎉🍅 \n\nGet it here: [Insert Link]";
            const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        }

        // Animations Initial Setup
        window.addEventListener('DOMContentLoaded', () => {
            // Setup End Page Initials (Pre-rendering states)
            gsap.set("#page-ending-card", { opacity: 0, y: 30 });
            gsap.set("#success-wrapper", { height: 0, opacity: 0 });
            gsap.set("#success-inner", { y: 40 });
            gsap.set("#checkmark-circle", { scale: 0 });
            gsap.set("#checkmark-tick", { strokeDasharray: 24, strokeDashoffset: 24 });
            gsap.set(".success-stagger", { opacity: 0, y: 15 });
            gsap.set("#reward-wrapper", { height: 0, opacity: 0 });
            gsap.set("#reward-inner", { y: -50 });
            document.getElementById('highlight-trigger').classList.remove('active');

            // Play Form Page Entry Animations
            gsap.fromTo("#page-form .gsap-card", 
                { opacity: 0, y: 50, scale: 0.98 }, 
                { opacity: 1, y: 0, scale: 1, duration: 0.85, ease: "power3.out", delay: 0.1 }
            );
            
            gsap.fromTo(".field", 
                { opacity: 0, x: -16 }, 
                { opacity: 1, x: 0, duration: 0.55, stagger: 0.09, ease: "power2.out", delay: 0.25, clearProps: "transform" }
            );

            gsap.fromTo(".submit-btn", 
                { opacity: 0, y: 16 }, 
                { opacity: 1, y: 0, duration: 0.55, ease: "power2.out", delay: 0.55, clearProps: "transform" }
            );

            gsap.fromTo(".trust-row", 
                { opacity: 0, y: 16 }, 
                { opacity: 1, y: 0, duration: 0.5, ease: "power2.out", delay: 0.65, clearProps: "transform" }
            );
            
            gsap.fromTo(".gsap-back-btn", 
                { opacity: 0, scale: 0.5, x: -10, rotation: -20 }, 
                { opacity: 1, scale: 1, x: 0, rotation: 0, duration: 0.8, ease: "back.out(1.5)", delay: 0.35 }
            );
        });

        // Form Submit -> Transition to End Page
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop page reload

            // Swap visibility classes (CSS handles cross-fade automatically)
            document.getElementById('page-form').classList.replace('visible-page', 'hidden-page');
            document.getElementById('page-ending').classList.replace('hidden-page', 'visible-page');

            // Play End Page Animations Timeline
            const tl = gsap.timeline();

            tl.to("#page-ending-card", { opacity: 1, y: 0, duration: 1.5, ease: "power4.out", delay: 0.3 })
              .to("#success-wrapper", { height: "auto", opacity: 1, duration: 1.0, ease: "power4.inOut" }, "<")
              .to("#success-inner", { y: 0, duration: 1.0, ease: "power4.out" }, "<0.1") 
              
              .to("#checkmark-circle", { scale: 1, duration: 0.5, ease: "back.out(1.6)" }, "-=0.3")
              .to("#checkmark-tick", { strokeDashoffset: 0, duration: 0.35, ease: "power2.out" })
              .add(() => {
                  confetti({ particleCount: 130, spread: 80, origin: { y: 0.45, x: 0.5 }, colors: ['#22c55e', '#facc15', '#16a34a'] });
              }, "-=0.1")
              .to(".success-stagger", { opacity: 1, y: 0, duration: 0.45, stagger: 0.1, ease: "power2.out" }, "-=0.1")
              
              .to({}, { duration: 1.0 }) // Short pause to read "Thank You"
              .addLabel("showReward")
              
              .to("#reward-wrapper", { height: "auto", duration: 1.4, ease: "power4.inOut" }, "showReward")
              .to("#reward-inner", { y: 0, duration: 1.4, ease: "power4.inOut" }, "showReward")
              .to("#reward-wrapper", { opacity: 1, duration: 1.0, ease: "power2.out" }, "showReward+=0.4")
              
              .add(() => {
                  document.getElementById('highlight-trigger').classList.add('active');
              }, "showReward+=1.2");
        });
    </script>
